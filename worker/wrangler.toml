name            = "advocatemcp-worker"
main            = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── KV Namespace ──────────────────────────────────────────────────────────
# Maps domain names → business slugs.
# Add entries with:
#   wrangler kv:key put --binding=BUSINESS_MAP "example.com" "my-business-slug"
[[kv_namespaces]]
binding    = "BUSINESS_MAP"
id         = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_NAMESPACE_ID"

# ── Secrets ───────────────────────────────────────────────────────────────
# Set these with:
#   wrangler secret put API_KEY
# Do NOT put real secrets in this file.
#
# Available secrets:
#   API_KEY        — forwarded to the AdvocateMCP server for auth
#
# ── Environment Variables ─────────────────────────────────────────────────
[vars]
API_BASE_URL = "https://api.advocatemcp.com"

# ── Routes ───────────────────────────────────────────────────────────────
# Uncomment and configure once you have a Cloudflare zone set up.
# Add one [[routes]] block per domain you want to intercept.
#
# [[routes]]
# pattern = "example.com/*"
# zone_name = "example.com"
#
# [[routes]]
# pattern = "www.example.com/*"
# zone_name = "example.com"
