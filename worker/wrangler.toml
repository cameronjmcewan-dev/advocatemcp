name               = "advocatemcp-worker"
main               = "src/index.ts"
compatibility_date = "2026-04-07"

# ── Observability ───────────────────────────────────────────────────────────
[observability]
enabled = true

# ── KV Namespace ────────────────────────────────────────────────────────────
# Maps domain hostnames → business slugs for AI crawler routing.
[[kv_namespaces]]
binding = "BUSINESS_MAP"
id      = "c6fa872c9bcc4b4390c30ac102888920"

# Tenant onboarding data — full JSON records for each onboarded domain.
# Create with: wrangler kv namespace create TENANT_DATA
[[kv_namespaces]]
binding = "TENANT_DATA"
id      = "8409a70d4c9c40fcbaf3e0ea697151e4"

# ── D1 Database ─────────────────────────────────────────────────────────────
# Auth data: users, sessions, user_business_access, businesses.
[[d1_databases]]
binding       = "DB"
database_name = "advocatemcp-auth"
database_id   = "1247938a-cf98-4c66-8588-5c9d71699094"

# ── Durable Objects ─────────────────────────────────────────────────────────
# Session 3: global per-IP rate limiter for /mcp proxy. A single DO instance
# (see getMcpRateLimiterStub in worker/src/lib/mcpRateLimitDO.ts — keyed on
# the literal "mcp-rate-limiter-v1") coordinates counters across every edge
# so the 60 req/min cap is globally coherent. Fail-open in the caller —
# mcpRateLimitDO.checkMcpRateLimit returns null on any DO error and the /mcp
# handler falls back to the in-memory isolate limiter.
[[durable_objects.bindings]]
name       = "MCP_RATE_LIMITER"
class_name = "McpRateLimiterDO"

# First-time registration of the DO class. If additional DO classes land
# later, append a new [[migrations]] stanza with a monotonically-increasing
# `tag` — don't mutate this one.
[[migrations]]
tag         = "v1-mcp-rate-limiter"
new_classes = ["McpRateLimiterDO"]

# ── Environment Variables ───────────────────────────────────────────────────
[vars]
API_BASE_URL = "https://advocate-production-2887.up.railway.app"

# ── Secrets ─────────────────────────────────────────────────────────────────
# Set with wrangler secret put <NAME>
#
#   API_KEY                — forwarded to Railway as X-API-Key on crawler proxy requests
#   ADMIN_SECRET           — protects POST /admin/create-client (use a long random string)
#   STRIPE_SECRET_KEY      — Stripe secret key (sk_test_... or sk_live_...)
#   STRIPE_WEBHOOK_SECRET  — Stripe webhook signing secret (whsec_...)
#   STRIPE_PRICE_ID_BASE   — Stripe Price ID for $100/mo base plan
#   STRIPE_PRICE_ID_PRO    — Stripe Price ID for $250/mo pro plan

# ── Routes ──────────────────────────────────────────────────────────────────
# customers.advocatemcp.com only. All portal, auth, admin, webhook, and
# onboarding endpoints are served on this hostname.
#
# WARNING: do NOT add a wildcard */* route on this zone. A wildcard was
# attempted on 2026-04-13 (commit 4d78b58) to catch CF for SaaS custom
# hostnames, but it broke the marketing site — the wildcard captured
# advocatemcp.com and www.advocatemcp.com traffic ahead of the Cloudflare
# Pages project, despite Cloudflare's documentation claiming Pages takes
# routing precedence. The marketing site returned the worker's JSON
# response instead of the Pages HTML for ~15 minutes until the revert
# deployed. Additionally, wrangler rollback does NOT revert Workers
# Routes (only the worker script), so the rollback was ineffective.
#
# DNS-customer custom hostname routing (e.g. www.workmancopyco.com)
# needs a different approach: per-hostname custom_origin_server via the
# CF API, or Workers for Platforms. That's a separate task.
[[routes]]
pattern   = "customers.advocatemcp.com/*"
zone_name = "advocatemcp.com"

# Public-wizard tenants are all subdomains of hosted.advocatemcp.com
# (see worker/src/routes/stripe.ts line 406 where the synthetic domain
# gets assigned as `${slug}.hosted.advocatemcp.com`). A wildcard at
# this depth is SAFE — unlike the Apr 13 *.advocatemcp.com incident,
# *.hosted.advocatemcp.com doesn't shadow the Pages project at the
# apex and catches only our own namespace. Every current + future
# public-wizard signup is covered declaratively here with no per-
# tenant API calls needed.
[[routes]]
pattern   = "*.hosted.advocatemcp.com/*"
zone_name = "advocatemcp.com"

# Custom-domain tenants — one [[routes]] entry per tenant. Currently
# just WCC. When a new custom-domain customer signs up, the Stripe
# webhook's ensureWorkerRouteForHostname() (worker/src/routes/domains.ts)
# creates the route via CF API at signup time. BUT: that API-created
# route can get dropped on subsequent `wrangler deploy` if wrangler
# reconciles declared-vs-actual routes. Declaring them here too makes
# the config the source of truth and survives every deploy. Trade-off:
# operator must add a line here per new custom-domain tenant.
#
# This was the root cause of the Apr 16 2026 incident: WCC's route
# was API-created at 4pm, dropped by subsequent Worker deploys, and
# bot traffic started returning 522 again ~3 hours later.
[[routes]]
pattern   = "www.workmancopyco.com/*"
zone_name = "advocatemcp.com"

