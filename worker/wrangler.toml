name               = "advocatemcp-worker"
main               = "src/index.ts"
compatibility_date = "2026-04-07"

# ── Observability ───────────────────────────────────────────────────────────
[observability]
enabled = true

# ── KV Namespace ────────────────────────────────────────────────────────────
# Maps domain hostnames → business slugs for AI crawler routing.
[[kv_namespaces]]
binding = "BUSINESS_MAP"
id      = "c6fa872c9bcc4b4390c30ac102888920"

# Tenant onboarding data — full JSON records for each onboarded domain.
# Create with: wrangler kv namespace create TENANT_DATA
[[kv_namespaces]]
binding = "TENANT_DATA"
id      = "8409a70d4c9c40fcbaf3e0ea697151e4"

# ── D1 Database ─────────────────────────────────────────────────────────────
# Auth data: users, sessions, user_business_access, businesses.
[[d1_databases]]
binding       = "DB"
database_name = "advocatemcp-auth"
database_id   = "1247938a-cf98-4c66-8588-5c9d71699094"

# ── Environment Variables ───────────────────────────────────────────────────
[vars]
API_BASE_URL = "https://advocate-production-2887.up.railway.app"

# ── Secrets ─────────────────────────────────────────────────────────────────
# Set with wrangler secret put <NAME>
#
#   API_KEY                — forwarded to Railway as X-API-Key on crawler proxy requests
#   ADMIN_SECRET           — protects POST /admin/create-client (use a long random string)
#   STRIPE_SECRET_KEY      — Stripe secret key (sk_test_... or sk_live_...)
#   STRIPE_WEBHOOK_SECRET  — Stripe webhook signing secret (whsec_...)
#   STRIPE_PRICE_ID_BASE   — Stripe Price ID for $100/mo base plan
#   STRIPE_PRICE_ID_PRO    — Stripe Price ID for $250/mo pro plan

# ── Routes ──────────────────────────────────────────────────────────────────
# Two routes on the advocatemcp.com zone:
#
#   1. customers.advocatemcp.com/* — the explicit platform hostname.
#      Portal, auth, admin, webhook, onboarding endpoints live here.
#
#   2. */* — wildcard catch-all for Cloudflare for SaaS custom hostnames.
#      When a DNS customer (e.g. www.workmancopyco.com) CNAMEs to
#      customers.advocatemcp.com, Cloudflare resolves the request to
#      the advocatemcp.com zone but the Host header stays as the
#      customer's domain. Without this wildcard, no Workers Route
#      matches the custom hostname and Cloudflare returns 522 (no
#      origin to connect to). With it, the worker receives the
#      request and routes it via BUSINESS_MAP KV lookup.
#
# Safety: Cloudflare Pages custom domains (advocatemcp.com,
# www.advocatemcp.com — the marketing site) take routing precedence
# over Workers Routes per Cloudflare's documented priority order
# (Pages custom domains = Priority 1, Workers Routes = Priority 3).
# The wildcard does not steal traffic from the Pages project.
[[routes]]
pattern   = "customers.advocatemcp.com/*"
zone_name = "advocatemcp.com"

[[routes]]
pattern   = "*/*"
zone_name = "advocatemcp.com"

