<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)">
<meta name="robots" content="noindex, nofollow">
<title>Page not found, Advocate</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  main.err-wrap {
    min-height: calc(100vh - 180px);
    display: grid;
    place-items: center;
    padding: 48px 24px;
  }
  .err-card {
    max-width: 560px;
    text-align: center;
  }
  .err-badge {
    display: inline-block;
    font-family: 'General Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--maroon);
    background: rgba(92, 26, 60, 0.08);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  .err-card h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-weight: 400;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1.08;
    margin: 0 0 14px;
    color: var(--ink);
  }
  .err-card p.lede {
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0 0 28px;
  }
  .err-ctas {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .err-links {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 13.5px;
  }
  .err-links a {
    color: var(--maroon);
    text-decoration: none;
    font-weight: 500;
    margin: 0 8px;
  }
  .err-links a:hover { text-decoration: underline; }
</style>
</head>
<body>

<main class="err-wrap">
  <div class="err-card">
    <span class="err-badge">404 · page not found</span>
    <h1>That URL doesn't lead anywhere&nbsp;useful.</h1>
    <p class="lede">
      Maybe a typo in the address bar, maybe an old link. Either way, here are the places that do work.
    </p>
    <div class="err-ctas">
      <a href="/" class="btn btn-primary btn-lg">Back to home</a>
      <a href="/audit.html" class="btn btn-ghost btn-lg">Run a free AI audit</a>
    </div>
    <div class="err-links">
      <a href="/Features.html">Features</a>·
      <a href="/Industries.html">Industries</a>·
      <a href="/Pricing.html">Pricing</a>·
      <a href="/FAQs.html">FAQs</a>·
      <a href="/Contact.html">Contact</a>
    </div>
  </div>
</main>

</body>
</html>
