<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)">
<meta name="robots" content="noindex, nofollow">
<title>Competitor Radar — Advocate</title>
<link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<link rel="stylesheet" href="/assets/dashboard.css">
<style>
  #boot-splash { position: fixed; inset: 0; display: grid; place-items: center; background: #fbf9f5; color: #766f63; font-family: "General Sans", system-ui, -apple-system, sans-serif; font-size: 14px; z-index: 1; } @media (prefers-color-scheme: dark) { #boot-splash { background: #141210; color: #8a7c78; } }
  .sb-nav a .badge { color: #fff; }
</style>
</head>
<body>
<div id="boot-splash" aria-live="polite">Loading&hellip;</div>
<script src="/assets/shared.js"></script>
<script src="/assets/dashboard-chrome.js"></script>
<script src="/js/dashboard-auth.js"></script>
<script src="/js/v2/shell.js"></script>
<script src="/js/v2/radar.js"></script>
<script>
/* Preview shows the Pro view (so reviewers can see the full feature).
 * Real non-Pro tenants see the locked / upsell view because the server
 * returns __gated or the client's AMCP_DATA.plan isn't 'pro'. Toggle
 * ?view=locked on the preview URL to see the upsell even in preview. */
var params = new URLSearchParams(location.search);
var forceLocked = params.get('view') === 'locked';
window.AMCP_SHELL.boot({
  activeId:    'radar',
  crumb:       'Dashboard · Competitor Radar',
  title:       'Competitor Radar',
  previewPlan: forceLocked ? 'base' : 'pro',
  demo:        window.AMCP_RADAR.demo,
  fetchReal:   window.AMCP_RADAR.fetch,
  render:      window.AMCP_RADAR.render,
  afterMount:  window.AMCP_RADAR.afterMount,
});
</script>
</body>
</html>
