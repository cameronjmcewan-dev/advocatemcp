<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)" />
<title>Sign in, Advocate</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/styles.css" />
<style>
/* Login page — focused single-card flow. Migrated to the new
   warm-paper design system (Apr 26 2026). All element IDs preserved
   so /js/dashboard-auth.js + the inline submit handler still work. */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:1rem;line-height:1.6;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
a{color:var(--maroon);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── Card ── */
.login-card{
  width:100%;max-width:400px;
  background:var(--paper-2);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:36px 32px;
  box-shadow:var(--shadow-md);
}

/* ── Logo ── */
.login-logo{
  display:flex;align-items:center;gap:8px;
  font-size:.875rem;font-weight:600;letter-spacing:-.01em;
  margin-bottom:28px;color:var(--ink);
}

/* ── Heading ── */
.login-h{
  font-family:var(--serif);font-weight:400;
  font-size:1.875rem;line-height:1.1;letter-spacing:-.02em;
  margin-bottom:6px;color:var(--ink);
}
.login-sub{font-size:.875rem;color:var(--ink-2);margin-bottom:28px}

/* ── Form ── */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.875rem;font-weight:500;margin-bottom:6px;color:var(--ink)}
.fi{
  width:100%;padding:10px 12px;
  background:var(--paper);border:1px solid var(--line);border-radius:var(--r-md);
  color:var(--ink);font-family:var(--sans);font-size:.875rem;
  transition:border-color .15s, box-shadow .15s;
}
.fi:focus{outline:none;border-color:var(--maroon);box-shadow:0 0 0 3px var(--maroon-tint)}
.fi::placeholder{color:var(--muted-2)}

/* ── Submit button ── */
.btn-submit{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:12px 20px;
  font-size:.9375rem;font-weight:500;
  background:var(--maroon);color:#fff;
  border:1px solid var(--maroon);border-radius:var(--r-md);
  transition:background .15s,border-color .15s;line-height:1;
}
.btn-submit:hover{background:var(--maroon-2);border-color:var(--maroon-2)}
.btn-submit:disabled{opacity:.55;cursor:not-allowed}

/* ── Error banner ── */
.login-error{
  display:none;
  padding:10px 14px;margin-bottom:20px;
  background:var(--maroon-wash);border:1px solid var(--maroon-tint);
  border-radius:var(--r-md);
  font-size:.875rem;color:var(--maroon);line-height:1.5;
}
.login-error.show{display:block}

/* ── Divider ── */
.login-divider{border:none;border-top:1px solid var(--line);margin:24px 0 18px}

/* ── Footer ── */
.login-foot{
  text-align:center;font-size:.875rem;color:var(--muted);
  margin-top:20px;
}
.login-foot a{color:var(--maroon)}
.login-foot a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="login-card">

  <div class="login-logo">
    <img src="/icon-192.png" alt="Advocate" width="22" height="22" style="border-radius:5px;display:block" />
    Advocate
  </div>

  <h1 class="login-h">Welcome back</h1>
  <p class="login-sub">Sign in to your Advocate dashboard</p>

  <div class="login-error" id="login-error" role="alert"></div>

  <form id="login-form" novalidate>
    <div class="fg">
      <label class="fl" for="email">Email</label>
      <input class="fi" id="email" name="email" type="email"
             autocomplete="email" placeholder="you@example.com" required />
    </div>
    <div class="fg" style="margin-bottom:20px">
      <label class="fl" for="password">Password</label>
      <input class="fi" id="password" name="password" type="password"
             autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required />
    </div>

    <button type="submit" class="btn-submit" id="submit-btn">
      Sign in
    </button>
  </form>

  <hr class="login-divider" />

  <p class="login-foot">
    Need an account? <a href="/onboarding.html">Get started &rarr;</a>
  </p>

</div>

<script src="/js/dashboard-auth.js"></script>
<script>
(function () {
  'use strict';

  var ERROR_MESSAGES = {
    invalid_credentials: 'Incorrect email or password. Please try again.',
    rate_limited:        'Too many sign-in attempts. Please wait a few minutes and try again.',
    platform_error:      'Something went wrong on our end. Please try again shortly.',
    invalid_body:        'Please enter a valid email and password.',
  };

  function showError(msg) {
    var el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError() {
    var el = document.getElementById('login-error');
    el.textContent = '';
    el.classList.remove('show');
  }

  function setLoading(loading) {
    var btn = document.getElementById('submit-btn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Signing in…' : 'Sign in';
  }

  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearError();

    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    if (!email || !password) {
      showError(ERROR_MESSAGES.invalid_body);
      return;
    }

    setLoading(true);
    try {
      await window.AMCP.login(email, password);
      window.location.href = '/dashboard.html';
    } catch (err) {
      var code = (err && err.error_code) ? err.error_code : 'platform_error';
      showError(ERROR_MESSAGES[code] || ERROR_MESSAGES.platform_error);
    } finally {
      setLoading(false);
    }
  });

  // If the refresh cookie is still valid, skip the login page entirely
  window.AMCP.refresh().then(function (ok) {
    if (ok) window.location.href = '/dashboard.html';
  });
})();
</script>
</body>
</html>
