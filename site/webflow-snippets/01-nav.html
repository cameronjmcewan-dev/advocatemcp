<style>
.nav-marketing {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center;
  padding: 0 48px; height: 60px;
  background: rgba(19,16,15,.82);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.nav-marketing-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: var(--tx-sm); font-weight: 600; letter-spacing: -.01em;
  flex-shrink: 0; color: var(--text-primary); text-decoration: none;
}
.nav-marketing-logo svg { width: 26px; height: 26px; }
.nav-marketing-links {
  display: flex; align-items: center; gap: 2px; margin-left: auto;
}
.nav-link {
  padding: 6px 14px; font-size: var(--tx-sm);
  color: var(--text-muted); border-radius: var(--r-xs);
  transition: color 150ms, background 150ms; text-decoration: none;
}
.nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,.06); }
.nav-marketing-actions {
  display: flex; align-items: center; gap: 12px; margin-left: 20px;
}
.nav-ham {
  display: none; align-items: center; justify-content: center;
  width: 34px; height: 34px; background: none;
  border: 1px solid var(--border); border-radius: var(--r-xs);
  color: var(--text-muted); margin-left: auto; cursor: pointer;
}
.nav-ham svg { width: 18px; height: 18px; }
.nav-mobile {
  display: none; position: fixed; inset: 60px 0 0; z-index: 199;
  background: var(--bg); border-top: 1px solid var(--border);
  flex-direction: column; padding: 20px; gap: 4px;
}
.nav-mobile.open { display: flex; }
.nav-mobile .nav-link { padding: 12px 14px; font-size: var(--tx-base); color: var(--text-primary); }
@media (max-width: 768px) {
  .nav-marketing { padding: 0 20px; }
  .nav-marketing-links, .nav-marketing-actions { display: none; }
  .nav-ham { display: flex; }
}
</style>

<nav class="nav-marketing">
