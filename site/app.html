<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard, Advocate</title>
<link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<link rel="stylesheet" href="/assets/dashboard.css">
<style>
  /* Hardcoded fallbacks so the splash paints Max's paper shade the
     instant the HTML lands, before /assets/styles.css loads and the
     CSS variables resolve. Without this, a dark-mode OS flashes the
     browser-default black on every sidebar click. */
  #boot-splash {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: #fbf9f5; color: #766f63;
    font-family: "General Sans", system-ui, -apple-system, sans-serif;
    font-size: 14px; letter-spacing: 0.02em; z-index: 1;
  }
  @media (prefers-color-scheme: dark) {
    #boot-splash { background: #141210; color: #8a7c78; }
  }

  /* Preview-state card on the Phase 2 Overview, marks the dashboard as
     a work-in-progress so users aren't misled by the incomplete section
     wiring. Phase 3 replaces this with real KPI cards wired to
     /api/client/metrics. */
  .db-preview-card {
    background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 40px; max-width: 760px; margin-top: 12px;
  }
  .db-preview-card .eyebrow { color: var(--maroon); }
  .db-preview-card h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(28px, 3vw, 38px); line-height: 1.1;
    margin: 12px 0 16px; color: var(--ink);
  }
  .db-preview-card p { color: var(--ink-2); line-height: 1.6; font-size: 16px; }
  .db-preview-card p + p { margin-top: 12px; }
  .db-preview-card a { color: var(--maroon); font-weight: 500; }
  .db-preview-card a:hover { color: var(--maroon-2); }
  .db-preview-meta {
    display: flex; gap: 18px; flex-wrap: wrap; margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 13px; color: var(--muted);
  }
  .db-preview-meta strong { color: var(--ink-2); font-weight: 500; }

  /* Sidebar brand-mark star + badge color, enforce the site-wide oxblood
     rule inside the dashboard chrome. .sb-nav badge is white on maroon so
     it doesn't invert to dark-on-maroon in OS dark mode. */
  .sb-nav a .badge { color: #fff; }
</style>
</head>
<body>

<div id="boot-splash" aria-live="polite">Loading&hellip;</div>

<script src="/assets/shared.js"></script>
<script src="/assets/dashboard-chrome.js"></script>
<script src="/js/dashboard-auth.js"></script>
<!-- Onboarding state machine + dependencies. Loaded on /app.html
     specifically because that's where the inline Get Started panel
     and the welcome-tour bridge fire. Other v2 pages don't need
     these, they only render data, not onboarding flows. -->
<script src="/js/dashboard-ui.js"></script>
<script src="/js/dashboard-onboarding.js"></script>
<script src="/js/dashboard-dns-wizard.js"></script>
<script src="/js/v2/shell.js"></script>
<script src="/js/v2/get-started.js"></script>
<script src="/js/v2/tour-bridge.js"></script>
<script src="/js/v2/overview.js"></script>

<!-- Profound-parity additions (course-correction Apr 29 2026):
     ECharts for chart rendering, Sortable.js for drag-and-drop,
     html2pdf.js for PDF export. All deferred so they don't block
     the legacy overview's first paint when the page is opened
     without ?dashboardId= (default Overview view). -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<script src="/js/v2/dashboardGrid.js" defer></script>
<script>
// Boot path forks on ?dashboardId= — present means render the
// configurable card-grid (Profound-parity), absent means the legacy
// hardcoded Overview. The fork happens via swapping render +
// afterMount; fetchReal still calls the same endpoints because the
// grid renderer reads from window.AMCP_DASHBOARDS for the layout.
(function () {
  const dashboardId = (() => {
    const n = Number.parseInt(new URL(location.href).searchParams.get('dashboardId') || '', 10);
    return Number.isFinite(n) ? n : null;
  })();

  // Helper to look up the active dashboard's row in the cached list
  // populated by shell.js. Returns null when the user has no saved
  // dashboards yet (pre-#146 worker, or anonymous preview mode).
  function getActiveDashboardRow() {
    const dash = window.AMCP_DASHBOARDS;
    if (!dash || !Array.isArray(dash.list)) return null;
    if (dashboardId != null) return dash.list.find((d) => d.id === dashboardId) || null;
    return dash.list.find((d) => d.is_default === 1) || dash.list[0] || null;
  }

  window.AMCP_SHELL.boot({
    activeId: 'overview',
    crumb:    'Dashboard · Overview',
    title:    d => `Welcome back${
      window.AMCP_DATA && window.AMCP_DATA.full_name
        ? ', ' + window.AMCP_DATA.full_name.split(' ')[0]
        : ''
    }.`,
    showDateRange: true,  // make the topbar date-range button visible
    demo:       window.AMCP_OVERVIEW.demo,
    fetchReal:  window.AMCP_OVERVIEW.fetch,
    // Render: fork on whether a dashboard layout is available + the
    // user explicitly requested ?dashboardId=. If neither, fall back
    // to the legacy hardcoded Overview. This preserves the existing
    // welcome screen for users who haven't customized anything yet.
    render: (data) => {
      const row = getActiveDashboardRow();
      const wantsGrid = dashboardId != null && row;
      if (wantsGrid) {
        // Placeholder; the real grid render happens in afterMount once
        // ECharts has loaded. Render an empty mount point so the layout
        // grid CSS reserves space.
        return '<div id="page-content-grid-mount"></div>';
      }
      return window.AMCP_OVERVIEW.render(data);
    },
    afterMount: (data) => {
      const row = getActiveDashboardRow();
      const wantsGrid = dashboardId != null && row;
      if (wantsGrid && window.AMCP_DASHBOARD_GRID) {
        let layout = [];
        try { layout = JSON.parse(row.layout_json) || []; } catch (_) { layout = []; }
        if (!Array.isArray(layout) || !layout.length) {
          // Fallback: same default seed as the worker uses.
          layout = [
            { card_id: 'visibilityScore',    size: 'sm' },
            { card_id: 'clickRate',          size: 'sm' },
            { card_id: 'queriesOverTime',    size: 'lg' },
            { card_id: 'botMix',             size: 'md' },
            { card_id: 'intentDistribution', size: 'md' },
            { card_id: 'activityHeatmap',    size: 'lg' },
            { card_id: 'topQueries',         size: 'md' },
            { card_id: 'agentReputation',    size: 'md' },
          ];
        }
        window.AMCP_DASHBOARD_GRID.mountGrid(layout);
      } else if (typeof window.AMCP_OVERVIEW.afterMount === 'function') {
        window.AMCP_OVERVIEW.afterMount(data);
      }
    },
  });
})();
</script>
<script src="/js/support-chat.js" defer></script>
</body>
</html>
