<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)" />
<title>Choose a new password, Advocate</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/styles.css" />
<style>
/* Reset-password page — terminal step of the password-reset flow.
   The customer arrived here via the link in their reset email, which
   carries the signed token in ?token=. We don't verify the token
   client-side (server is authoritative); we just read it from the URL
   and POST it along with the new password. */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:1rem;line-height:1.6;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
a{color:var(--maroon);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.login-card{
  width:100%;max-width:400px;
  background:var(--paper-2);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:36px 32px;
  box-shadow:var(--shadow-md);
}
.login-logo{
  display:flex;align-items:center;gap:8px;
  font-size:.875rem;font-weight:600;letter-spacing:-.01em;
  margin-bottom:28px;color:var(--ink);
}
.login-h{
  font-family:var(--serif);font-weight:400;
  font-size:1.875rem;line-height:1.1;letter-spacing:-.02em;
  margin-bottom:6px;color:var(--ink);
}
.login-sub{font-size:.875rem;color:var(--ink-2);margin-bottom:28px}

.fg{margin-bottom:16px}
.fl{display:block;font-size:.875rem;font-weight:500;margin-bottom:6px;color:var(--ink)}
.fi{
  width:100%;padding:10px 12px;
  background:var(--paper);border:1px solid var(--line);border-radius:var(--r-md);
  color:var(--ink);font-family:var(--sans);font-size:.875rem;
  transition:border-color .15s, box-shadow .15s;
}
.fi:focus{outline:none;border-color:var(--maroon);box-shadow:0 0 0 3px var(--maroon-tint)}
.fi::placeholder{color:var(--muted-2)}
.fh{font-size:.75rem;color:var(--muted);margin-top:6px}

.btn-submit{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:12px 20px;
  font-size:.9375rem;font-weight:500;
  background:var(--maroon);color:#fff;
  border:1px solid var(--maroon);border-radius:var(--r-md);
  transition:background .15s,border-color .15s;line-height:1;
}
.btn-submit:hover{background:var(--maroon-2);border-color:var(--maroon-2)}
.btn-submit:disabled{opacity:.55;cursor:not-allowed}

.login-error{
  display:none;
  padding:10px 14px;margin-bottom:20px;
  background:var(--maroon-wash);border:1px solid var(--maroon-tint);
  border-radius:var(--r-md);
  font-size:.875rem;color:var(--maroon);line-height:1.5;
}
.login-error.show{display:block}

.login-divider{border:none;border-top:1px solid var(--line);margin:24px 0 18px}
.login-foot{text-align:center;font-size:.875rem;color:var(--muted);margin-top:20px}
.login-foot a{color:var(--maroon)}
.login-foot a:hover{text-decoration:underline}

/* Invalid-link state — shown when ?token= is missing or the server
   reports token_invalid / token_expired / token_already_used. */
.error-card{display:none;text-align:center;padding:8px 4px 4px}
.error-card.show{display:block}
.error-card .x{
  display:inline-flex;align-items:center;justify-content:center;
  width:48px;height:48px;border-radius:50%;
  background:var(--maroon-wash);color:var(--maroon);
  font-size:24px;margin:0 auto 16px;
}
.error-card p{margin:0 0 16px;font-size:.9375rem;color:var(--ink-2);line-height:1.55}
</style>
</head>
<body>

<div class="login-card">

  <div class="login-logo">
    <img src="/icon-192.png" alt="Advocate" width="22" height="22" style="border-radius:5px;display:block" />
    Advocate
  </div>

  <!-- Form state — visible only when ?token= is present in the URL. -->
  <div id="form-state" style="display:none">
    <h1 class="login-h">Choose a new password</h1>
    <p class="login-sub">Pick something at least 8 characters long.</p>

    <div class="login-error" id="login-error" role="alert"></div>

    <form id="reset-form" novalidate>
      <div class="fg">
        <label class="fl" for="password">New password</label>
        <input class="fi" id="password" name="password" type="password"
               autocomplete="new-password" placeholder="At least 8 characters" required minlength="8" />
        <p class="fh">Choose something memorable but unique to Advocate.</p>
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label class="fl" for="confirm">Confirm new password</label>
        <input class="fi" id="confirm" name="confirm" type="password"
               autocomplete="new-password" placeholder="Re-enter the same password" required minlength="8" />
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        Update password
      </button>
    </form>
  </div>

  <!-- Error state — no token, expired link, already-used link, or
       server-side token_invalid. -->
  <div class="error-card" id="error-state">
    <div class="x" aria-hidden="true">!</div>
    <h1 class="login-h" style="font-size:1.5rem">Link no longer valid</h1>
    <p id="error-message">This reset link is invalid or has expired. Request a fresh one from the sign-in page.</p>
    <a href="/forgot-password.html" class="btn-submit" style="text-decoration:none">Get a new reset link</a>
  </div>

  <hr class="login-divider" />

  <p class="login-foot">
    Back to <a href="/login.html">sign in</a>
  </p>

</div>

<script>
(function () {
  'use strict';

  var API_BASE = 'https://customers.advocatemcp.com';

  // ── Token extraction + initial state ──────────────────────────────
  // We never read or trust the token client-side beyond passing it
  // through. The server is the only authority on its validity.
  var token = '';
  try {
    token = new URLSearchParams(window.location.search).get('token') || '';
  } catch (_) { /* fall through to error state */ }

  function showErrorState(message) {
    document.getElementById('form-state').style.display = 'none';
    var card = document.getElementById('error-state');
    if (message) document.getElementById('error-message').textContent = message;
    card.classList.add('show');
  }

  if (!token) {
    showErrorState('We didn’t find a reset token in the link. Request a fresh one from the sign-in page.');
  } else {
    document.getElementById('form-state').style.display = 'block';
  }

  // ── Form behaviour ────────────────────────────────────────────────
  var ERROR_MESSAGES = {
    invalid_body:        'Please enter your new password in both fields.',
    weak_password:       'Your new password must be at least 8 characters.',
    token_expired:       'This reset link has expired. Request a fresh one below.',
    token_invalid:       'This reset link is invalid. Request a fresh one below.',
    token_already_used:  'This reset link has already been used. Request a fresh one if you need to reset again.',
    platform_error:      'Something went wrong on our end. Please try again shortly.',
  };
  var TOKEN_CODES = { token_expired:1, token_invalid:1, token_already_used:1 };

  function showError(msg) {
    var el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearError() {
    var el = document.getElementById('login-error');
    el.textContent = '';
    el.classList.remove('show');
  }
  function setLoading(loading) {
    var btn = document.getElementById('submit-btn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Updating…' : 'Update password';
  }

  var form = document.getElementById('reset-form');
  if (form) form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearError();

    var pw     = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;

    if (!pw || !confirm) {
      showError(ERROR_MESSAGES.invalid_body);
      return;
    }
    if (pw.length < 8) {
      showError(ERROR_MESSAGES.weak_password);
      return;
    }
    if (pw !== confirm) {
      showError('The two passwords don’t match.');
      return;
    }

    setLoading(true);
    try {
      var res = await fetch(API_BASE + '/api/auth/reset-password', {
        method:      'POST',
        credentials: 'include',
        headers:     { 'Content-Type': 'application/json' },
        body:        JSON.stringify({ token: token, new_password: pw }),
      });
      var body = null;
      try { body = await res.json(); } catch (_) { /* ignore */ }

      if (res.ok && body && body.ok) {
        // Successful reset → land on /login.html with the banner. Use
        // location.replace so the back button doesn't pull the user
        // back to the (now invalid) reset URL.
        window.location.replace('/login.html?reset=ok');
        return;
      }

      var code = body && body.error_code ? body.error_code : 'platform_error';
      if (TOKEN_CODES[code]) {
        // Switch the whole page over to the error state — the form is
        // unrecoverable without a fresh token.
        showErrorState(ERROR_MESSAGES[code] || ERROR_MESSAGES.platform_error);
        return;
      }
      showError(ERROR_MESSAGES[code] || ERROR_MESSAGES.platform_error);
      setLoading(false);
    } catch (_) {
      showError(ERROR_MESSAGES.platform_error);
      setLoading(false);
    }
  });
})();
</script>
</body>
</html>
