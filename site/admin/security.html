<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)">
<meta name="robots" content="noindex, nofollow">
<title>Security — Advocate admin</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<link rel="stylesheet" href="/assets/dashboard.css">
<style>
  #boot-splash { position: fixed; inset: 0; display: grid; place-items: center;
    background: #fbf9f5; color: #766f63;
    font-family: "General Sans", system-ui, -apple-system, sans-serif;
    font-size: 14px; z-index: 1; }
  @media (prefers-color-scheme: dark) { #boot-splash { background: #141210; color: #8a7c78; } }
  /* TOTP card styles — local to this page. Uses paper / ink / maroon tokens
     from /assets/styles.css. Status box + form share spacing with the
     existing dashboard.css fg/fl/fi pattern. */
  .totp-wrap{max-width:640px;margin:0 auto;padding:24px 0}
  .totp-box{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-lg);
            padding:20px 24px;margin-bottom:24px}
  .totp-box--ok{border-color:var(--success,#3a7d44)}
  .totp-box--warn{border-color:var(--warn,#b46d28)}
  .totp-box h3{font-family:var(--serif);font-weight:400;font-size:1.4rem;margin:0 0 8px}
  .totp-box p{color:var(--ink-2);margin:0 0 8px}
  .totp-steps{margin:8px 0 16px 24px;color:var(--ink-2)}
  .totp-steps li{margin-bottom:6px}
  .totp-uri{font-family:var(--mono,ui-monospace,monospace);font-size:.8125rem;word-break:break-all}
  .totp-secret{margin:8px 0 6px}
  .totp-secret code{font-family:var(--mono,ui-monospace,monospace);font-size:1rem;letter-spacing:.05em}
  .totp-meta{font-size:.8125rem;color:var(--muted-2);margin:4px 0 0}
  .totp-form{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-lg);
             padding:20px 24px}
  .totp-form h4{font-family:var(--serif);font-weight:400;font-size:1.125rem;margin:0 0 12px}
  .totp-warn{color:var(--ink-2);font-size:.875rem;margin-bottom:12px}
  .totp-err{color:var(--danger,#a3373b);font-size:.875rem;margin-top:10px;min-height:1.2em}
  .totp-loading{color:var(--ink-2)}
  .btn-primary,.btn-secondary,.btn-danger{
    display:inline-flex;align-items:center;justify-content:center;
    padding:10px 18px;font-family:inherit;font-size:.9375rem;font-weight:500;
    border-radius:var(--r-md);cursor:pointer;border:1px solid transparent;line-height:1;
    transition:background .15s,border-color .15s,color .15s;
  }
  .btn-primary{background:var(--maroon);color:#fff;border-color:var(--maroon)}
  .btn-primary:hover{background:var(--maroon-2);border-color:var(--maroon-2)}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .btn-secondary{background:var(--paper);color:var(--ink);border-color:var(--line)}
  .btn-secondary:hover{background:var(--paper-2)}
  .btn-danger{background:var(--paper);color:var(--danger,#a3373b);border-color:var(--danger,#a3373b)}
  .btn-danger:hover{background:var(--danger,#a3373b);color:#fff}
  .btn-danger:disabled{opacity:.55;cursor:not-allowed}
</style>
</head>
<body>
<div id="boot-splash" aria-live="polite">Loading&hellip;</div>
<script src="/assets/shared.js"></script>
<script src="/assets/dashboard-chrome.js"></script>
<script src="/js/dashboard-auth.js"></script>
<script src="/js/v2/shell.js"></script>
<script src="/js/v2/commandPalette.js"></script>
<script>
// Minimal page module — the TOTP UI itself is rendered by /js/admin-totp.js
// into #totp-app. We just give the shell a render fn that emits the mount
// point + fetchReal/demo no-ops so the shell.boot contract is satisfied.
window.AMCP_ADMIN_SECURITY = (function () {
  return {
    demo: function () { return Promise.resolve({}); },
    fetch: function () { return Promise.resolve({}); },
    render: function () {
      return '<div class="totp-wrap">' +
               '<h2 class="page-title">Account security</h2>' +
               '<p class="page-sub">Two-factor authentication for your administrator account.</p>' +
               '<div id="totp-app"><div id="totp-status"></div></div>' +
             '</div>';
    },
    afterMount: function () {
      // admin-totp.js mounts itself on DOMContentLoaded; for shell-driven
      // pages it has to be re-invoked after the shell injects content.
      if (window.__AMCP_TOTP_BOOTED) return;
      window.__AMCP_TOTP_BOOTED = true;
      var s = document.createElement('script');
      s.src = '/js/admin-totp.js';
      document.body.appendChild(s);
    },
  };
})();
window.AMCP_SHELL.boot({
  activeId:    'admin-security',
  crumb:       'Internal · Security',
  title:       'Account security',
  previewPlan: 'admin',
  demo:        window.AMCP_ADMIN_SECURITY.demo,
  fetchReal:   window.AMCP_ADMIN_SECURITY.fetch,
  render:      window.AMCP_ADMIN_SECURITY.render,
  afterMount:  window.AMCP_ADMIN_SECURITY.afterMount,
});
</script>
</body>
</html>
